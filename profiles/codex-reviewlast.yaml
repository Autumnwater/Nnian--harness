# Codex ReviewLast Profile
# Used for: done (final plan review and final code review sign-off)

profile: codex-reviewlast
role: final-approver
model: codex

# Workspace
cwd: /Users/admin/project/ai/reviewlast

# Permissions
permissions:
  - read: /Users/admin/project/ai/reviewDoc (all review outputs)
  - read: /Users/admin/project/ai/work/HEXAI (business code)
  - approve: final sign-off and merge readiness
  - plan: overall task planning and task decomposition
  - cannot-write: /Users/admin/project/ai/work/HEXAI (business code, unless user changes role)
  - cannot-read: .claude/settings.json
  - cannot-modify: .claude/settings.json

# Responsibilities
responsibilities:
  - Final plan review sign-off
  - Final code review sign-off
  - Go/no-go decision for merge
  - Harness does not substitute for this role

