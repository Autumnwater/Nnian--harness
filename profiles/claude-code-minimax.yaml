# Claude Code (Minimax) Profile
# Used for: code-implementation, code-fix, delivery

profile: claude-code-minimax
role: implementer
model: minimax

# Workspace
cwd: /Users/admin/project/ai/code
codeRepo: /Users/admin/project/ai/work/HEXAI

# Permissions
permissions:
  # CAN do
  - read-write: /Users/admin/project/ai/work/HEXAI (task-related business code)
  - write: /Users/admin/project/ai/reviewDoc (code mappings, fix reports, delivery reports, verification evidence for the current task reportRoot)
  - write: Harness/runs/{taskId}/outputs (current stage output mirror)
  - read: /Users/admin/project/ai/reviewDoc/ReviewPlaybooks

  # CANNOT do
  - cannot-write: reviewer's review finding documents
  - cannot-approve: own plans or code
  - cannot-read: .claude/settings.json
  - cannot-modify: .claude/settings.json
  - cannot-execute: destructive git, commit, push (unless user explicitly requests)

# Responsibilities
responsibilities:
  - Implement code based on approved implementation plans
  - Fix code based on code review findings
  - Generate delivery reports with evidence and acceptance summaries
  - Keep implementation and fixes scoped to the accepted plan and review findings
  - Write handoff documents when interrupted
