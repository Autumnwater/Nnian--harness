# HEXAI Weekly Canvas Task Workflow
# Defines the stage sequence, profile bindings, and product path contract
# for W6-A, W7-A, and similar weekly canvas tasks.

taskId: "W6-A"
taskTitle: "W6-A 画布本体UIUX收口"

# Product path contract
reportRoot: "/Users/admin/project/ai/reviewDoc/W6"
reportDirPattern: "{reportRoot}/{subtaskId}"
codeRepo: "/Users/admin/project/ai/work/HEXAI"
reviewRoot: "/Users/admin/project/ai/reviewDoc"

# Stage sequence with profile and skill bindings
stages:
  - id: implementation-plan
    label: "实施方案"
    requiredSkill: null
    ownerProfile: claude-plan-minimax
    nextStage: plan-review

  - id: plan-review
    label: "方案 Review"
    requiredSkill: hexai-plan-review
    ownerProfile: claude-reviewer-deepseek
    nextStage: plan-fix

  - id: plan-fix
    label: "方案修订"
    requiredSkill: hexai-plan-fix
    ownerProfile: claude-plan-minimax
    nextStage: plan-fix-review

  - id: plan-fix-review
    label: "方案修订 Review"
    requiredSkill: hexai-plan-review
    ownerProfile: claude-reviewer-deepseek
    nextStage: code-implementation

  - id: code-implementation
    label: "代码实施"
    requiredSkill: null
    ownerProfile: claude-code-minimax
    nextStage: code-review

  - id: code-review
    label: "Code Review"
    requiredSkill: hexai-code-review
    ownerProfile: claude-reviewer-deepseek
    nextStage: code-fix

  - id: code-fix
    label: "代码修复"
    requiredSkill: hexai-code-fix
    ownerProfile: claude-code-minimax
    nextStage: code-fix-review

  - id: code-fix-review
    label: "代码修复复审"
    requiredSkill: hexai-code-review
    ownerProfile: claude-reviewer-deepseek
    nextStage: delivery

  - id: delivery
    label: "交付物整理"
    requiredSkill: hexai-delivery
    ownerProfile: claude-code-minimax
    nextStage: done

  - id: done
    label: "完成"
    requiredSkill: null
    ownerProfile: codex-reviewlast
    nextStage: null

reviewStages:
  - plan-review
  - plan-fix-review
  - code-review
  - code-fix-review

fixStages:
  - plan-fix
  - code-fix

fixReviewStages:
  - plan-fix-review
  - code-fix-review

planStages:
  - implementation-plan
  - plan-fix

codeStages:
  - code-implementation
  - code-fix
  - delivery

reviewLastStages:
  - done

implementerStages:
  - implementation-plan
  - plan-fix
  - code-implementation
  - code-fix
  - delivery

# Subtask definitions for W6-A
subtasks:
  - id: W6-A-01
    title: "缩放锚点"
    shortTitle: "缩放锚点"
    taskTheme: "W6-A画布本体UIUX收口"

  - id: W6-A-02
    title: "移动磁吸与红色参考线"
    shortTitle: "移动磁吸与红色参考线"
    taskTheme: "W6-A画布本体UIUX收口"

  - id: W6-A-03
    title: "选中态、控制点与 Cursor 补充优化"
    shortTitle: "选中态控制点与Cursor补充优化"
    taskTheme: "W6-A画布本体UIUX收口"

  - id: W6-A-04
    title: "CV-06编辑元素阶段补齐"
    shortTitle: "CV-06编辑元素阶段补齐"
    taskTheme: "W6-A画布本体UIUX收口"

  - id: W6-A-05
    title: "Space后移项跟踪"
    shortTitle: "Space后移项跟踪"
    taskTheme: "W6-A画布本体UIUX收口"

  - id: W6-A-06
    title: "右侧Agent边界确认"
    shortTitle: "右侧Agent边界确认"
    taskTheme: "W6-A画布本体UIUX收口"

# File naming rules by stage
fileNaming:
  implementation-plan:
    pattern: "{reportDir}/{taskTheme}实施计划-{YYYYMMDD}.md"

  plan-review:
    pattern: "{reportDir}/{subtaskId}{shortTitle}计划Review意见.md"
    roundSuffix: "-第{n}轮"

  plan-fix:
    pattern: "{reportDir}/{taskTheme}计划-FixReport.md"
    altPattern: "{reportDir}/{subtaskId}{shortTitle}计划-FixReport.md"

  plan-fix-review:
    pattern: "{reportDir}/{subtaskId}{shortTitle}计划FixReview意见.md"
    roundSuffix: "-第{n}轮"

  code-implementation:
    pattern: "{reportDir}/{subtaskId}任务到代码映射.md"

  code-review:
    pattern: "{reportDir}/{subtaskId}{shortTitle}CodeReview意见.md"
    roundSuffix: "-第{n}轮"

  code-fix:
    pattern: "{reportDir}/{subtaskId}{shortTitle}CodeFix报告.md"
    roundSuffix: "-第{n}轮"

  code-fix-review:
    pattern: "{reportDir}/{subtaskId}{shortTitle}CodeFix复审意见.md"
    roundSuffix: "-第{n}轮"

  delivery:
    pattern: "{reportDir}/{subtaskId}交付物报告.md"

  handoff:
    pattern: "{reportDir}/{subtaskId}-{stage}-handoff.md"

# Review playbooks required by stage
requiredPlaybooks:
  plan-review:
    - "/Users/admin/project/ai/reviewDoc/ReviewPlaybooks/plan-review-playbook.md"
    - "/Users/admin/project/ai/reviewDoc/ReviewPlaybooks/canvas-stage-review-playbook.md"
  plan-fix-review:
    - "/Users/admin/project/ai/reviewDoc/ReviewPlaybooks/plan-review-playbook.md"
    - "/Users/admin/project/ai/reviewDoc/ReviewPlaybooks/canvas-stage-review-playbook.md"
  code-review:
    - "/Users/admin/project/ai/reviewDoc/ReviewPlaybooks/code-review-playbook.md"
    - "/Users/admin/project/ai/reviewDoc/ReviewPlaybooks/canvas-stage-review-playbook.md"
  code-fix-review:
    - "/Users/admin/project/ai/reviewDoc/ReviewPlaybooks/code-review-playbook.md"
    - "/Users/admin/project/ai/reviewDoc/ReviewPlaybooks/canvas-stage-review-playbook.md"
